{% extends "furo/sidebar/brand.html" %} {% block brand_content %}
<a
  class="sidebar-brand{% if logo %} centered{% endif %}"
  href="{{ pathto(master_doc) }}"
>
  <div class="sidebar-logo-container">
    <img class="sidebar-logo" src="{{ pathto('_static/logo.png', 1) }}" alt="Logo" />
  </div>
</a>
<div style="text-align: center">
  <script async defer src="https://buttons.github.io/buttons.js"></script>
  <!-- Place this tag where you want the button to render. -->
  <a
    class="github-button"
    href="https://github.com/solaris-wm/solaris-engine"
    data-color-scheme="no-preference: light; light: light; dark: light;"
    data-size="large"
    data-show-count="true"
    aria-label="Download buttons/github-buttons on GitHub"
  >
    Github
  </a>
</div>
{% endblock brand_content %}
