name: "Sphinx: Render docs"

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: docs/requirements.txt

      # If you use sphinx-js, you typically need jsdoc/typedoc available
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JSDoc (for sphinx-js)
        run: npm install -g jsdoc
        # If you use TypeScript instead:
        # run: npm install -g typedoc@0.28
        # sphinx-js notes these tools explicitly :contentReference[oaicite:1]{index=1}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Build HTML
        run: make -C docs html

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: html-docs
          path: docs/build/html/

      - name: Deploy
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build/html
